<!-- App pulizia filtri murali refrigerati - Fogal Refrigeration -->
<div id="app-root"></div>
<style>
  :root{
    --steel-900:#10202E;--steel-700:#1C3447;--steel-500:#2F5169;
    --ice-400:#5FB8D6;--ice-300:#9AD7E8;
    --frost-50:#F4F8FA;--frost-100:#E7EFF2;
    --amber:#E0A23B;--red:#D1453B;--green:#3F9468;--border:#D6E1E6;
    font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  #app-root{background:var(--frost-50);min-height:100%;width:100%;}
  .topbar{
    background:var(--steel-900);color:white;padding:16px 22px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(135deg,var(--ice-400),var(--steel-500));
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;color:var(--steel-900);letter-spacing:-.5px;
  }
  .brand-text{display:flex;flex-direction:column;line-height:1.15;}
  .brand-text b{font-size:15px;letter-spacing:.2px;}
  .brand-text span{font-size:11.5px;color:var(--ice-300);}
  .lang-switch{display:flex;gap:5px;}
  .lang-btn{
    border:1.5px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.7);
    padding:5px 11px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;
  }
  .lang-btn.active{background:var(--ice-400);color:var(--steel-900);border-color:var(--ice-400);}
  .lang-btn:not(.active):hover{background:rgba(255,255,255,.1);color:white;}

  .content{padding:22px;max-width:680px;margin:0 auto;}
  .card{background:white;border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px;}
  .card h2{margin:0 0 4px;font-size:17px;color:var(--steel-900);}
  .card .sub{margin:0 0 16px;font-size:13px;color:var(--steel-500);}

  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  .photo-box{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--frost-100);position:relative;}
  .photo-box img{width:100%;display:block;}
  .photo-tag{
    position:absolute;left:8px;bottom:8px;right:8px;background:rgba(16,32,46,.88);
    color:var(--ice-300);font-size:11px;padding:5px 8px;border-radius:6px;
    display:flex;align-items:flex-start;gap:5px;font-weight:600;line-height:1.3;
  }
  .photo-tag .dot{width:6px;height:6px;min-width:6px;border-radius:50%;background:var(--ice-400);margin-top:3px;}
  @media(max-width:540px){.photo-grid{grid-template-columns:1fr;}}

  label{display:block;font-size:12.5px;font-weight:700;color:var(--steel-700);
    margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
  .field{margin-bottom:16px;position:relative;}
  input[type=text],input[type=email],input[type=tel]{
    width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;
    font-size:14.5px;color:var(--steel-900);background:white;outline:none;transition:border-color .15s;
  }
  input:focus{border-color:var(--ice-400);}

  .autocomplete-list{
    position:absolute;top:100%;left:0;right:0;background:white;
    border:1.5px solid var(--ice-400);border-top:none;border-radius:0 0 9px 9px;
    max-height:230px;overflow-y:auto;z-index:30;box-shadow:0 8px 20px rgba(16,32,46,.12);
  }
  .autocomplete-item{padding:10px 13px;cursor:pointer;font-size:13.5px;border-bottom:1px solid var(--frost-100);}
  .autocomplete-item:hover{background:var(--frost-100);}
  .autocomplete-item b{color:var(--steel-900);}
  .autocomplete-item .meta{color:var(--steel-500);font-size:12px;margin-top:2px;}

  .info-box{
    background:var(--frost-100);border-radius:10px;padding:13px 15px;
    margin-bottom:16px;font-size:13.5px;color:var(--steel-700);display:none;
  }
  .info-box.show{display:block;}
  .info-box .row{display:flex;justify-content:space-between;padding:3px 0;gap:12px;}
  .info-box .row b{color:var(--steel-900);text-align:right;}

  .check-row{
    display:flex;align-items:center;gap:12px;padding:14px 15px;
    background:var(--frost-100);border-radius:10px;cursor:pointer;
    border:1.5px solid transparent;transition:all .15s;
  }
  .check-row.checked{border-color:var(--green);background:#EAF5EF;}
  .check-row input{width:20px;height:20px;accent-color:var(--green);cursor:pointer;}
  .check-row .lbl{font-size:14px;font-weight:600;color:var(--steel-900);}
  .check-row .lbl small{display:block;font-weight:400;color:var(--steel-500);font-size:12px;margin-top:1px;}

  .next-box{
    margin-top:12px;padding:12px 15px;border-radius:10px;
    background:#FFF7EA;border:1px solid #F0DDB0;font-size:13.5px;
    display:none;align-items:center;gap:8px;color:#8A6116;
  }
  .next-box.show{display:flex;}
  .next-box b{color:#6E4B0C;}

  .toggle-row{
    display:flex;align-items:center;gap:10px;margin:14px 0 0;
    cursor:pointer;user-select:none;font-size:13.5px;color:var(--steel-700);
  }
  .toggle-row input{width:17px;height:17px;accent-color:var(--ice-400);cursor:pointer;}
  .extra-fields{display:none;margin-top:12px;flex-direction:column;gap:10px;}
  .extra-fields.show{display:flex;}

  .submit-btn{
    width:100%;padding:14px;border:none;border-radius:10px;
    background:var(--steel-900);color:white;font-size:14.5px;font-weight:700;
    cursor:pointer;margin-top:18px;transition:background .15s;
  }
  .submit-btn:hover{background:var(--steel-700);}
  .submit-btn:disabled{background:#B7C2C9;cursor:not-allowed;}

  .result-box{
    display:none;text-align:center;padding:30px 20px;
  }
  .result-box.show{display:block;}
  .result-icon{font-size:48px;margin-bottom:12px;}
  .result-title{font-size:18px;font-weight:700;color:var(--green);margin-bottom:6px;}
  .result-sub{font-size:13.5px;color:var(--steel-500);margin-bottom:20px;}
  .result-next{
    background:#FFF7EA;border:1px solid #F0DDB0;border-radius:10px;
    padding:12px 16px;font-size:13.5px;color:#8A6116;margin-bottom:20px;display:inline-block;
  }
  .result-next b{color:#6E4B0C;}
  .new-btn{
    border:2px solid var(--steel-900);background:white;color:var(--steel-900);
    padding:11px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
  }
  .new-btn:hover{background:var(--frost-100);}

  .spinner{
    display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
    border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:-4px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-box{
    display:none;background:#FCEAE9;border:1px solid #F0C4C2;border-radius:10px;
    padding:12px 15px;margin-top:14px;font-size:13.5px;color:var(--red);
  }
  .error-box.show{display:block;}
</style>

          <div class="result-next" id="result-next"></div>
          <br/>
          <button class="new-btn" id="new-btn">${t('newReg')}</button>
        </div>
      </div>
    </div>
  `;

  // Lang switch
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.addEventListener('click',()=>{ currentLang=b.dataset.lang; render(); });
  });

  // Autocomplete
  let selectedMat = null;
  const matInput = document.getElementById('mat-input');
  const matList = document.getElementById('mat-list');
  const infoBox = document.getElementById('info-box');
  const checkRow = document.getElementById('check-row');
  const checkBox = document.getElementById('check-clean');
  const nextBox = document.getElementById('next-box');
  const submitBtn = document.getElementById('submit-btn');
  const reminderToggle = document.getElementById('reminder-toggle');
  const addrToggle = document.getElementById('addr-toggle');

  function selectMat(item){
    selectedMat = item;
    matInput.value = item.matricola;
    matList.style.display='none';
    document.getElementById('info-pv').textContent = item.punto_vendita;
    document.getElementById('info-ort').textContent = item.plz+' '+item.ort+', Svizzera';
    infoBox.classList.add('show');
    updateSubmit();
  }

  function filterList(q){
    q=q.trim().toLowerCase();
    if(!q){matList.style.display='none';return;}
    const res = MATRICOLE.filter(m=>
      m.matricola.toLowerCase().includes(q)||
      m.ort.toLowerCase().includes(q)||
      m.punto_vendita.toLowerCase().includes(q)
    ).slice(0,30);
    if(!res.length){matList.style.display='none';return;}
    matList.innerHTML = res.map(r=>`
      <div class="autocomplete-item" data-mat="${r.matricola}">
        <b>${r.matricola}</b>
        <div class="meta">${r.punto_vendita} · ${r.plz} ${r.ort}</div>
      </div>`).join('');
    matList.style.display='block';
    matList.querySelectorAll('.autocomplete-item').forEach(el=>{
      el.addEventListener('click',()=>selectMat(MATRICOLE.find(m=>m.matricola===el.dataset.mat)));
    });
  }

  matInput.addEventListener('input',e=>{selectedMat=null;infoBox.classList.remove('show');updateSubmit();filterList(e.target.value);});
  matInput.addEventListener('focus',e=>{if(e.target.value)filterList(e.target.value);});
  document.addEventListener('click',e=>{if(!matInput.contains(e.target)&&!matList.contains(e.target))matList.style.display='none';});

  checkRow.addEventListener('click',e=>{
    if(e.target.tagName!=='INPUT') checkBox.checked=!checkBox.checked;
    checkRow.classList.toggle('checked',checkBox.checked);
    if(checkBox.checked){
      document.getElementById('next-date').textContent = fmtDate(addDays(new Date(),CLEANING_INTERVAL_DAYS));
      nextBox.classList.add('show');
    } else {
      nextBox.classList.remove('show');
    }
    updateSubmit();
  });

  reminderToggle.addEventListener('change',()=>document.getElementById('reminder-fields').classList.toggle('show',reminderToggle.checked));
  addrToggle.addEventListener('change',()=>document.getElementById('addr-fields').classList.toggle('show',addrToggle.checked));

  function updateSubmit(){ submitBtn.disabled=!(selectedMat&&checkBox.checked); }

  // Submit -> Google Sheets
  submitBtn.addEventListener('click', async ()=>{
    if(!selectedMat||!checkBox.checked) return;
    submitBtn.disabled=true;
    submitBtn.innerHTML=`<span class="spinner"></span>${t('submitting')}`;
    document.getElementById('error-box').classList.remove('show');

    const now = new Date();
    const prossimo = addDays(now, CLEANING_INTERVAL_DAYS);
    const payload = {
      matricola: selectedMat.matricola,
      punto_vendita: selectedMat.punto_vendita,
      plz: selectedMat.plz,
      ort: selectedMat.ort,
      data_pulizia: now.toISOString(),
      prossimo_intervento: prossimo.toISOString(),
      reminder_email: reminderToggle.checked?(document.getElementById('reminder-email').value||'').trim():'',
      reminder_tel: reminderToggle.checked?(document.getElementById('reminder-tel').value||'').trim():'',
      variazione_indirizzo: addrToggle.checked?(document.getElementById('addr-new').value||'').trim():'',
      lingua: currentLang
    };

    try {
      await fetch(SHEETS_URL, {
        method:'POST',
        mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=UTF-8'},
        body: JSON.stringify(payload)
      });
      // Mostra schermata successo
      document.getElementById('form-area').style.display='none';
      const rb = document.getElementById('result-box');
      document.getElementById('result-title').textContent = t('successTitle');
      document.getElementById('result-sub').textContent = t('successSub');
      document.getElementById('result-next').innerHTML = `${t('nextScheduled')} <b>${fmtDate(prossimo)}</b>`;
      rb.classList.add('show');
      document.getElementById('new-btn').addEventListener('click',()=>render());
    } catch(err) {
      submitBtn.disabled=false;
      submitBtn.textContent=t('submit');
      document.getElementById('error-box').classList.add('show');
    }
  });
}

render();
})();
</script>
